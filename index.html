<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transfer Calculator</title>
  <style>
    /* ── Mobile-first base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 12px;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
      background: #f7f7f7;
    }
    h2 { margin-top: 0; font-size: 20px; }

    label { display: block; margin: 10px 0; }
    button, input { padding: 8px; font-size: 15px; }
    input[type="time"] { font-size: 15px; padding: 8px; width: 100%; }

    .appHeader {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0 6px;
      margin-bottom: 8px;
      border-bottom: 1px solid #e5e5e5;
    }
    .appHeader img { max-width: 100%; height: auto; }

    .searchRow { display: grid; gap: 6px; }
    .searchRow input { width: 100%; }

    /* ── Section cards ── */
    .sectionCard {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* ── Section headings ── */
    .sectionHeading {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: #86C2BD;
      padding: 8px 12px;
      border-radius: 8px;
      margin: 0 0 12px;
    }

    /* ── Time Critical checkbox ── */
    .timeCriticalRow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0 10px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #f4f4f4;
      border: 2px solid #ccc;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
      user-select: none;
    }
    .timeCriticalRow.active { background: #fff3f3; border-color: #e6223d; }
    .timeCriticalRow input[type="checkbox"] {
      width: 22px; height: 22px; accent-color: #e6223d;
      cursor: pointer; flex-shrink: 0; padding: 0;
    }
    .timeCriticalRow span { font-size: 16px; font-weight: 700; }

    /* ── Second Transfer checkbox ── */
    .secondTransferRow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 12px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #f4f4f4;
      border: 2px solid #ccc;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
      user-select: none;
    }
    .secondTransferRow.active { background: #f0f7ff; border-color: #2980b9; }
    .secondTransferRow input[type="checkbox"] {
      width: 22px; height: 22px; accent-color: #2980b9;
      cursor: pointer; flex-shrink: 0; padding: 0;
    }
    .secondTransferRow span { font-size: 16px; font-weight: 700; }

    /* ── Read-only starting location ── */
    .startingLocDisplay {
      padding: 8px;
      font-size: 14px;
      background: #e9e9e9;
      border-radius: 6px;
      color: #444;
      font-style: italic;
      border: 1px solid #ccc;
      width: 100%;
    }

    /* ── Result boxes ── */
    .resultBox {
      margin-top: 12px;
      padding: 14px;
      font-size: 19px;
      font-weight: bold;
      text-align: center;
      border-radius: 10px;
      background: #e9e9e9;
      color: #222;
    }
    .assumptions {
      margin-top: 10px;
      font-style: italic;
      color: #555;
      line-height: 1.4;
      font-size: 13px;
    }
    .etaBox {
      margin-top: 10px;
      padding: 12px;
      font-size: 17px;
      font-weight: bold;
      text-align: center;
      border-radius: 10px;
      background: #fff;
      color: #000;
      border: 2px solid #000;
    }
    .jobCycleBox {
      margin-top: 10px;
      padding: 12px;
      font-size: 17px;
      font-weight: bold;
      text-align: center;
      border-radius: 10px;
      background: #fff;
      color: #000;
      border: 2px solid #000;
    }
    .handoverNote {
      margin-top: 6px;
      font-style: italic;
      color: #555;
      font-size: 13px;
      line-height: 1.35;
    }
    .backOnBaseBox {
      margin-top: 10px;
      padding: 12px;
      font-size: 17px;
      font-weight: bold;
      text-align: center;
      border-radius: 10px;
      background: #e9e9e9;
      color: #222;
    }
    .hemsAlert {
      margin-top: 12px;
      padding: 14px;
      border-radius: 10px;
      background: #e6223d;
      border: 3px solid #00bfbf;
      color: white;
      font-weight: 700;
      line-height: 1.35;
      display: none;
    }
    .recommendationBox {
      margin-top: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      border-radius: 10px;
      background: #86C2BD;
      color: #fff;
      line-height: 1.5;
    }

    /* ── Calculate button ── */
    .calcBtn {
      margin-top: 4px;
      border: 0;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: #86C2BD;
      cursor: pointer;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    .calcBtn:active { filter: brightness(0.9); }

    /* ── Transfer 2 section (hidden until toggled) ── */
    #transfer2Section { display: none; }
    #transfer2Section.visible { display: block; }
  </style>
</head>
<body>

<div class="appHeader">
  <img
    src="https://www.arccksstransferservice.nhs.uk/base-install/images/main-logo/company-logo.png"
    alt="ARCC KSS logo"
  />
</div>

<h2>Transfer Calculator</h2>

<!-- ===== INPUTS ===== -->
<div class="sectionCard">

  <label class="searchRow">
    Departure Time:
    <input id="departureTime" type="time" />
  </label>

  <label class="searchRow">
    Team:
    <input id="teamInput" list="teamList" placeholder="Type to search (West/East)" />
    <datalist id="teamList">
      <option value="West"></option>
      <option value="East"></option>
    </datalist>
  </label>

  <label class="searchRow">
    Starting Location:
    <input id="startingLocationInput" list="startingLocationList" placeholder="Type to search..." />
    <datalist id="startingLocationList"></datalist>
  </label>

  <label class="searchRow">
    Referring Hospital:
    <input id="referringInput" list="referringList" placeholder="Type to search..." />
    <datalist id="referringList"></datalist>
  </label>

  <label class="searchRow">
    Receiving Hospital:
    <input id="receivingInput" list="receivingList" placeholder="Type to search..." onchange="syncTransfer2Start()" oninput="syncTransfer2Start()" />
    <datalist id="receivingList"></datalist>
  </label>

  <label class="timeCriticalRow" id="timeCriticalRow_1">
    <input type="checkbox" id="timeCriticalCheck_1" onchange="updateTimeCriticalStyle(1)" />
    <span>Time Critical</span>
  </label>

  <label class="secondTransferRow" id="secondTransferRow">
    <input type="checkbox" id="secondTransferCheck" onchange="toggleSecondTransfer()" />
    <span>Second Transfer</span>
  </label>

  <!-- Transfer 2 inputs — shown when Second Transfer ticked -->
  <div id="transfer2Section">
    <label class="searchRow">
      Starting Location (Transfer 1 Receiving Hospital):
      <div class="startingLocDisplay" id="startingLocDisplay_2">— set Receiving Hospital in Transfer 1 —</div>
    </label>

    <label class="searchRow">
      Referring Hospital:
      <input id="referringInput_2" list="referringList_2" placeholder="Type to search..." />
      <datalist id="referringList_2"></datalist>
    </label>

    <label class="searchRow">
      Receiving Hospital:
      <input id="receivingInput_2" list="receivingList_2" placeholder="Type to search..." />
      <datalist id="receivingList_2"></datalist>
    </label>

    <label class="timeCriticalRow" id="timeCriticalRow_2">
      <input type="checkbox" id="timeCriticalCheck_2" onchange="updateTimeCriticalStyle(2)" />
      <span>Time Critical</span>
    </label>
  </div>

  <button class="calcBtn" type="button" onclick="calculateAll()">Calculate Journey Time</button>

</div>

<!-- ===== TRANSFER 1 RESULTS ===== -->
<div class="sectionCard" id="results1Section" style="display:none;">
  <div class="sectionHeading">Transfer 1</div>
  <div id="etaReferring_1" class="etaBox" style="display:none;"></div>
  <div id="result_1" class="resultBox">Time to Receiving Hospital</div>
  <div id="etaReceiving_1" class="etaBox" style="display:none;"></div>
  <div id="assumptions_1" class="assumptions" style="display:none;"></div>
  <div id="jobCycleResult_1" class="jobCycleBox" style="display:none;"></div>
  <div id="handoverNote_1" class="handoverNote" style="display:none;"></div>
  <div id="backOnBaseResult_1" class="backOnBaseBox" style="display:none;"></div>
  <div id="hemsAlert_1" class="hemsAlert"></div>
  <div id="recommendation_1" class="recommendationBox" style="display:none;"></div>
</div>

<!-- ===== TRANSFER 2 RESULTS ===== -->
<div class="sectionCard" id="results2Section" style="display:none;">
  <div class="sectionHeading">Transfer 2</div>
  <div id="etaReferring_2" class="etaBox" style="display:none;"></div>
  <div id="result_2" class="resultBox">Time to Receiving Hospital</div>
  <div id="etaReceiving_2" class="etaBox" style="display:none;"></div>
  <div id="assumptions_2" class="assumptions" style="display:none;"></div>
  <div id="jobCycleResult_2" class="jobCycleBox" style="display:none;"></div>
  <div id="handoverNote_2" class="handoverNote" style="display:none;"></div>
  <div id="backOnBaseResult_2" class="backOnBaseBox" style="display:none;"></div>
  <div id="hemsAlert_2" class="hemsAlert"></div>
  <div id="recommendation_2" class="recommendationBox" style="display:none;"></div>
</div>

<script>
/* =========================
   SECOND TRANSFER TOGGLE
   ========================= */
function toggleSecondTransfer() {
  const cb = document.getElementById("secondTransferCheck");
  const row = document.getElementById("secondTransferRow");
  const t2section = document.getElementById("transfer2Section");

  row.classList.toggle("active", cb.checked);
  t2section.classList.toggle("visible", cb.checked);

  if (cb.checked) syncTransfer2Start();

  // Hide T2 results if unticking
  if (!cb.checked) {
    document.getElementById("results2Section").style.display = "none";
  }
}



/* =========================
   SYNC TRANSFER 2 START FROM TRANSFER 1 RECEIVING
   ========================= */
function syncTransfer2Start() {
  const receiving1 = (document.getElementById("receivingInput").value || "").trim();
  const display = document.getElementById("startingLocDisplay_2");
  display.textContent = receiving1 || "— set Receiving Hospital in Transfer 1 —";
}

/* =========================
   TIME CRITICAL STYLE TOGGLE
   ========================= */

  const cb = document.getElementById(`timeCriticalCheck_${num}`);

}

const transferTimes = {};

});

/* =========================
   HELPERS
   ========================= */
function minutesToHHMM(totalMinutes) {
  const total = Math.round(totalMinutes);
  const hh = Math.floor(total / 60);
  const mm = String(total % 60).padStart(2, "0");
  return `${hh}:${mm}`;
}

function formatHHMM(dateObj) {
  const hh = String(dateObj.getHours()).padStart(2, "0");
  const mm = String(dateObj.getMinutes()).padStart(2, "0");
  return `${hh}:${mm}`;
}

function addMinutesToNowUK(totalMinutes) {
  const now = new Date();
  return new Date(now.getTime() + Math.round(totalMinutes) * 60000);
}

/* =========================
   CALCULATE ALL (single button)
   ========================= */
function calculateAll() {
  const secondActive = document.getElementById("secondTransferCheck").checked;

  // Build departure Date from the departure time input field
  const timeVal = document.getElementById("departureTime").value;
  const now = new Date();
  let departure = new Date();
  if (timeVal) {
    const [hh, mm] = timeVal.split(":").map(Number);
    departure = new Date();
    departure.setHours(hh, mm, 0, 0);
  }

  // Extra minutes to add to "Time to Receiving" to account for future departure
  const departureOffsetMins = Math.max(0, (departure.getTime() - now.getTime()) / 60000);

  // Calculate transfer 1 from the specified departure time
  const t1result = calculateTransfer(1, departure, departureOffsetMins);

  // If second transfer is active, chain: T2 departs at T1 ETA receiving + 45 min handover
  if (secondActive) {
    if (t1result && t1result.etaReceivingDate) {
      const t2Departure = new Date(t1result.etaReceivingDate.getTime() + 45 * 60000);
      // Pass T1's time-to-receiving + 45 so T2 can add it to its own time-to-receiving
      calculateTransfer(2, t2Departure, t1result.timeToReceivingMinutes + 45);
    } else {
      showError(2, "Could not calculate Transfer 2 — please fix Transfer 1 first.");
    }
    // Show T2 results section and update recommendations
    document.getElementById("results2Section").style.display = "block";
    requestAnimationFrame(() => requestAnimationFrame(updateRecommendations));
  } else {
    requestAnimationFrame(() => requestAnimationFrame(updateRecommendations));
  }
}

/* =========================
   CALCULATION
   num = 1 or 2
   departureDate: Date object used as the "now" reference for this leg
   Returns { etaReceivingDate } or null on error
   ========================= */
function calculateTransfer(num, departureDate, priorMinutes) {
  const isTimeCritical = document.getElementById(`timeCriticalCheck_${num}`).checked;

  let teamRaw, startInput, referring, receiving;

  if (num === 1) {
    teamRaw    = (document.getElementById("teamInput").value || "").trim().toLowerCase();
    startInput = (document.getElementById("startingLocationInput").value || "").trim();
    referring  = (document.getElementById("referringInput").value || "").trim();
    receiving  = (document.getElementById("receivingInput").value || "").trim();
  } else {
    teamRaw    = (document.getElementById("teamInput").value || "").trim().toLowerCase();
    startInput = (document.getElementById("receivingInput").value || "").trim();
    referring  = (document.getElementById("referringInput_2").value || "").trim();
    receiving  = (document.getElementById("receivingInput_2").value || "").trim();

    if (!startInput) {
      showError(num, "Please set a Receiving Hospital in Transfer 1 first.");
      return null;
    }
  }

  const team = teamRaw === "east" ? "east" : "west";

  if (!referring || !receiving || !startInput) {
    showError(num, "Please fill in all hospital fields.");
    return null;
  }

  let startHospital = startInput;
  if (startInput === "West Base – Crawley") startHospital = "Crawley Hospital";
  if (startInput === "East Base – Maidstone") startHospital = "Maidstone Hospital";

  const toRef    = transferTimes[`${startHospital}|${referring}`];
  const refToRec = transferTimes[`${referring}|${receiving}`];

  if (toRef == null)    { showError(num, `No time found for "${startHospital}" → "${referring}"`); return null; }
  if (refToRec == null) { showError(num, `No time found for "${referring}" → "${receiving}"`); return null; }

  const baseHospital  = (team === "west") ? "Crawley Hospital" : "Maidstone Hospital";
  const backToBaseRaw = transferTimes[`${receiving}|${baseHospital}`];
  if (backToBaseRaw == null) { showError(num, `No time found for "${receiving}" → "${baseHospital}"`); return null; }

  let displayTimeToReceiving, displayTotalJobCycle, etaRefMinutes;

  if (isTimeCritical) {
    const timeToReceiving  = toRef + 30 + refToRec;
    const backToBase_tc    = backToBaseRaw * 1.2;
    const totalJobCycle_tc = timeToReceiving + 45 + backToBase_tc;
    displayTimeToReceiving = timeToReceiving;
    displayTotalJobCycle   = totalJobCycle_tc;
    etaRefMinutes          = toRef;
  } else {
    const timeToReceiving = toRef + 30 + refToRec;
    const backToBase_ntc  = backToBaseRaw * 1.2;
    const totalJobCycle   = timeToReceiving + 45 + backToBase_ntc;
    displayTimeToReceiving = timeToReceiving * 1.2;
    displayTotalJobCycle   = totalJobCycle * 1.2;
    etaRefMinutes          = toRef * 1.2;
  }

  // All ETAs calculated relative to the departure date for this leg
  const addMins = (mins) => new Date(departureDate.getTime() + Math.round(mins) * 60000);

  const etaReferring   = addMins(etaRefMinutes);
  const etaReceiving   = addMins(displayTimeToReceiving);
  const backOnBaseTime = addMins(displayTotalJobCycle);

  // For column 2, displayed "Time to Receiving" includes the prior transfer leg + 45 min handover
  const combinedTimeToReceiving = (priorMinutes || 0) + displayTimeToReceiving;

  displayResults(num, {
    isTimeCritical,
    timeToReceivingMinutes: combinedTimeToReceiving,
    totalJobCycleMinutes:   displayTotalJobCycle,
    etaReferringDate:  etaReferring,
    etaReceivingDate:  etaReceiving,
    backOnBaseDate:    backOnBaseTime,
    referring,
    receiving
  });

  return { etaReceivingDate: etaReceiving, timeToReceivingMinutes: combinedTimeToReceiving };
}

/* =========================
   RESULT DISPLAY
   ========================= */
function displayResults(num, data) {
  const {
    isTimeCritical, timeToReceivingMinutes, totalJobCycleMinutes,
    etaReferringDate, etaReceivingDate, backOnBaseDate, referring, receiving
  } = data;

  // Show the results section card for this transfer
  const section = document.getElementById(`results${num}Section`);
  if (section) section.style.display = "block";

  const result      = document.getElementById(`result_${num}`);
  const etaRefBox   = document.getElementById(`etaReferring_${num}`);
  const etaRecBox   = document.getElementById(`etaReceiving_${num}`);
  const assumptions = document.getElementById(`assumptions_${num}`);
  const jobCycle    = document.getElementById(`jobCycleResult_${num}`);
  const handoverNote= document.getElementById(`handoverNote_${num}`);
  const backOnBase  = document.getElementById(`backOnBaseResult_${num}`);

  etaRefBox.style.display = "block";
  etaRefBox.textContent = `ETA at Referring hospital: ${formatHHMM(etaReferringDate)}`;

  result.textContent = `Time to Receiving Hospital: ${minutesToHHMM(timeToReceivingMinutes)}`;

  if (isTimeCritical) {
    const total = Math.round(timeToReceivingMinutes);
    result.style.color = "white";
    if (total < 180) result.style.background = "green";
    else if (total < 240) result.style.background = "#FFBF00";
    else result.style.background = "red";
  } else {
    result.style.background = "#86C2BD";
    result.style.color = "white";
  }

  etaRecBox.style.display = "block";
  etaRecBox.textContent = `ETA at Receiving Hospital: ${formatHHMM(etaReceivingDate)}`;

  assumptions.style.display = "block";
  assumptions.textContent = isTimeCritical
    ? "This calculation assumes blue light driving to the referring hospital (10% time saving), 30 minutes packaging time, and then blue light driving to the receiving hospital, and is designed to assist with decision making for time critical transfers only"
    : "This calculation assumes routine driving for all legs of journey and provides an estimated time to receiving hospital";

  jobCycle.style.display = "block";
  jobCycle.textContent = `Total Estimated Job Cycle: ${minutesToHHMM(totalJobCycleMinutes)}`;

  handoverNote.style.display = "block";
  handoverNote.textContent = "Allows 45 minutes handover at receiving hospital";

  backOnBase.style.display = "block";
  backOnBase.textContent = `Estimated time back on base: ${formatHHMM(backOnBaseDate)}`;
  backOnBase.style.color = "white";

  const minutesOfDay = backOnBaseDate.getHours() * 60 + backOnBaseDate.getMinutes();
  const t0900 = 9 * 60;        // 09:00
  const t2030 = 20 * 60 + 30; // 20:30
  const t2130 = 21 * 60 + 30; // 21:30
  // Red: 21:30–midnight or midnight–09:00
  // Amber: 20:30–21:30
  // Green: 09:00–20:30
  if (minutesOfDay >= t2130 || minutesOfDay < t0900) backOnBase.style.background = "red";
  else if (minutesOfDay >= t2030) backOnBase.style.background = "#FFBF00";
  else backOnBase.style.background = "green";
  backOnBase.dataset.minutesOfDay = minutesOfDay;

  if (isTimeCritical) {
    updateHemsAlert(num, referring, receiving);
  } else {
    const alertBox = document.getElementById(`hemsAlert_${num}`);
    alertBox.style.display = "none";
    alertBox.textContent = "";
  }
}

/* =========================
   RECOMMENDATIONS
   ========================= */
function updateRecommendations() {
  const secondActive = document.getElementById("secondTransferCheck").checked;

  const result1    = document.getElementById("result_1");
  const backOnBase1 = document.getElementById("backOnBaseResult_1");
  const rec1       = document.getElementById("recommendation_1");

  const result1Colour    = result1.style.background;
  const backOnBase1Colour = backOnBase1.style.background;

  // Only show if results are visible
  if (backOnBase1.style.display === "none") {
    rec1.style.display = "none";
    if (secondActive) document.getElementById("recommendation_2").style.display = "none";
    return;
  }

  // Helper to set a recommendation box with title + result on separate lines
  function setRec(el, text) {
    el.style.display = "block";
    el.innerHTML = "<div style='font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;opacity:0.85;margin-bottom:6px;'>Recommendation</div>" +
                   "<div>" + text + "</div>";
  }

  // --- Transfer 1 recommendation ---
  const tc1 = document.getElementById("timeCriticalCheck_1").checked;
  let t1Text = "";

  if (!tc1) {
    // Non-time-critical: use actual back-on-base time thresholds
    const t2030 = 20 * 60 + 30;
    const t2130 = 21 * 60 + 30;
    const t0900 = 9 * 60;
    const bobMins = parseInt(backOnBase1.dataset.minutesOfDay ?? "-1", 10);
    const bobRed   = bobMins >= t2130 || (bobMins >= 0 && bobMins < t0900);
    const bobAmber = !bobRed && bobMins >= t2030;

    if (bobRed) {
      t1Text = "Decline Transfer 1 (Unacceptable overrun >1hr)";
    } else if (bobAmber) {
      t1Text = "Accept Transfer 1 (Risk of overrun)";
    } else {
      t1Text = "Accept Transfer 1";
    }
  } else {
    // Time Critical: use precise thresholds
    const t2030 = 20 * 60 + 30;
    const t2130 = 21 * 60 + 30;
    const t0900 = 9 * 60;
    const timeToRec1 = Math.round(parseFloat(result1.textContent.replace(/[^0-9.]/g, '')) || 0);
    // Re-derive minutes from stored data attribute
    const bobMins = parseInt(backOnBase1.dataset.minutesOfDay ?? "-1", 10);
    const bobRed   = bobMins >= t2130 || (bobMins >= 0 && bobMins < t0900);
    const bobAmber = !bobRed && bobMins >= t2030;

    if (result1Colour === "red") {
      // Time to receiving >= 4 hours
      t1Text = "Decline Transfer 1 and arrange frontline SECAmb vehicle (unable to achieve time critical KPI)";
    } else if (bobRed) {
      t1Text = "Decline Transfer 1 (Unacceptable overrun likely)";
    } else if (bobAmber) {
      t1Text = "Accept Transfer 1 (Risk of overrun)";
    } else {
      t1Text = "Accept Transfer 1";
    }
  }

  // --- Transfer 2 recommendation ---
  if (secondActive) {
    const result2     = document.getElementById("result_2");
    const backOnBase2 = document.getElementById("backOnBaseResult_2");
    const rec2        = document.getElementById("recommendation_2");

    if (backOnBase2.style.display === "none") {
      rec2.style.display = "none";
    } else {
      const tc2          = document.getElementById("timeCriticalCheck_2").checked;
      const result2Colour = result2.style.background;
      const t2030 = 20 * 60 + 30;
      const t2130 = 21 * 60 + 30;
      const t0900 = 9 * 60;
      const bobMins2 = parseInt(backOnBase2.dataset.minutesOfDay ?? "-1", 10);
      const bob2Red   = bobMins2 >= t2130 || (bobMins2 >= 0 && bobMins2 < t0900);
      const bob2Amber = !bob2Red && bobMins2 >= t2030;

      let t2Text = "";
      if (!tc2) {
        if (bob2Red)        t2Text = "Decline Transfer 2 (Unacceptable overrun >1hr)";
        else if (bob2Amber) t2Text = "Accept Transfer 2 (Risk of overrun)";
        else                t2Text = "Accept Transfer 2";
      } else {
        if (result2Colour === "red") {
          t2Text = "Decline Transfer 2 and arrange frontline SECAmb vehicle (unable to achieve time critical KPI)";
        } else if (bob2Red) {
          t2Text = "Decline Transfer 2 (Unacceptable overrun likely)";
        } else if (bob2Amber) {
          t2Text = "Accept Transfer 2 (Risk of overrun)";
        } else {
          t2Text = "Accept Transfer 2";
        }
      }

      setRec(rec2, t2Text);
    }
  }

  setRec(rec1, t1Text);
}

   ========================= */
function showError(num, message) {
  const section = document.getElementById(`results${num}Section`);
  if (section) section.style.display = "block";

  const result       = document.getElementById(`result_${num}`);
  const etaRefBox    = document.getElementById(`etaReferring_${num}`);
  const etaRecBox    = document.getElementById(`etaReceiving_${num}`);
  const assumptions  = document.getElementById(`assumptions_${num}`);
  const jobCycle     = document.getElementById(`jobCycleResult_${num}`);
  const handoverNote = document.getElementById(`handoverNote_${num}`);
  const backOnBase   = document.getElementById(`backOnBaseResult_${num}`);
  const alertBox     = document.getElementById(`hemsAlert_${num}`);

  result.textContent = message;
  result.style.background = "red";
  result.style.color = "white";

  [etaRefBox, etaRecBox, assumptions, jobCycle, handoverNote, backOnBase].forEach(el => {
    el.style.display = "none";
    el.textContent = "";
  });
  alertBox.style.display = "none";
  alertBox.textContent = "";
  const rec = document.getElementById(`recommendation_${num}`);
  if (rec) { rec.style.display = "none"; rec.textContent = ""; }
}
</script>
