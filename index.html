<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Transfer Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 14px; }
    h2 { margin-top: 0; }

    label { display: block; margin: 10px 0; }
    button, input { padding: 8px; font-size: 14px; }

    .appHeader {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0 6px;
      margin-bottom: 8px;
      border-bottom: 1px solid #e5e5e5;
    }
    .appHeader img {
      max-width: 520px;
      width: 100%;
      height: auto;
    }

    .searchRow { display: grid; gap: 6px; }
    .searchRow input { width: 100%; box-sizing: border-box; }

    /* Time Critical checkbox row */
    .timeCriticalRow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0 10px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #f4f4f4;
      border: 2px solid #ccc;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
      user-select: none;
    }
    .timeCriticalRow.active {
      background: #fff3f3;
      border-color: #e6223d;
    }
    .timeCriticalRow input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #e6223d;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
    }
    .timeCriticalRow span {
      font-size: 16px;
      font-weight: 700;
    }

    .resultBox {
      margin-top: 15px;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      border-radius: 10px;
      min-height: 28px;
      background: #e9e9e9;
      color: #222;
    }

    .assumptions {
      margin-top: 10px;
      font-style: italic;
      color: #333;
      max-width: 820px;
      line-height: 1.35;
    }

    .etaBox {
      margin-top: 12px;
      padding: 12px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      border-radius: 10px;
      background: #fff;
      color: #000;
      border: 2px solid #000;
      min-height: 24px;
    }

    .jobCycleBox {
      margin-top: 12px;
      padding: 12px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      border-radius: 10px;
      background: #fff;
      color: #000;
      border: 2px solid #000;
      min-height: 24px;
    }

    .handoverNote {
      margin-top: 8px;
      font-style: italic;
      color: #333;
      max-width: 820px;
      line-height: 1.35;
    }

    .backOnBaseBox {
      margin-top: 12px;
      padding: 12px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      border-radius: 10px;
      min-height: 24px;
      background: #e9e9e9;
      color: #222;
    }

    .hemsAlert {
      margin-top: 14px;
      padding: 14px;
      border-radius: 10px;
      background: #e6223d;
      border: 3px solid #00bfbf;
      color: white;
      font-weight: 700;
      line-height: 1.35;
      display: none;
    }

    .calcBtn {
      margin-top: 4px;
      border: 0;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: #86C2BD;
      cursor: pointer;
    }
    .calcBtn:hover { filter: brightness(0.95); }
  </style>
</head>

<div class="appHeader">

<h2>Transfer Calculator</h2>

<label class="searchRow">

/* =========================
   BUILD LOOKUPS
   ========================= */
const transferTimes = {};
const hospitals = new Set();

rawTransfers.trim().split("\n").forEach(line => {
  const [from, to, min] = line.split("|").map(x => x.trim());
  hospitals.add(from);
  hospitals.add(to);
  transferTimes[`${from}|${to}`] = Number(min);
});

/* =========================
   POPULATE SEARCH LISTS
   ========================= */
document.addEventListener("DOMContentLoaded", () => {
  const startingList = document.getElementById("startingLocationList");
  const referringList = document.getElementById("referringList");
  const receivingList = document.getElementById("receivingList");

  const startingOptions = ["West Base – Crawley", "East Base – Maidstone", ...[...hospitals].sort()];
  startingOptions.forEach(v => startingList.appendChild(new Option(v)));

  [...hospitals].sort().forEach(h => {
    referringList.appendChild(new Option(h));
    receivingList.appendChild(new Option(h));
  });

  document.getElementById("teamInput").value = "West";
  document.getElementById("startingLocationInput").value = "West Base – Crawley";
});

/* =========================
   HELPERS
   ========================= */
function minutesToHHMM(totalMinutes) {
  const total = Math.round(totalMinutes);
  const hh = Math.floor(total / 60);
  const mm = String(total % 60).padStart(2, "0");
  return `${hh}:${mm}`;
}

function formatHHMM(dateObj) {
  const hh = String(dateObj.getHours()).padStart(2, "0");
  const mm = String(dateObj.getMinutes()).padStart(2, "0");
  return `${hh}:${mm}`;
}

function addMinutesToNowUK(totalMinutes) {
  const now = new Date();
  return new Date(now.getTime() + Math.round(totalMinutes) * 60000);
}

/* =========================
   HEMS ALERT (time critical only)
   ========================= */
function updateHemsAlert(referring, receiving) {
  const alertBox = document.getElementById("hemsAlert");

  const referringSet = new Set([
    "Tunbridge Wells Hospital",
    "QEQM Hospital",
    "William Harvey Hospital",
    "Eastbourne District General Hospital",
    "Maidstone Hospital",
    "Royal Sussex County Hospital",
    "Darent Valley Hospital",
    "Frimley Park Hospital"
  ]);

  const receivingSet = new Set([
    "King's College Hospital",
    "St George's Hospital",
    "Royal Sussex County Hospital"
  ]);

  const show = referringSet.has(referring) && receivingSet.has(receiving);

  if (show) {
    alertBox.style.display = "block";
    alertBox.textContent =
      "If this transfer is time critical, particularly from ED, consider contacting AAKSS HEMS via their desk for an aeromedical transfer on 03001235811 or 01634471999";
  } else {
    alertBox.style.display = "none";
    alertBox.textContent = "";
  }
}

/* =========================
   CALCULATION
   ========================= */
function calculate() {
  const isTimeCritical = document.getElementById("timeCriticalCheck").checked;

  const teamRaw = (document.getElementById("teamInput").value || "").trim().toLowerCase();
  const team = teamRaw === "east" ? "east" : "west";

  const startInput = (document.getElementById("startingLocationInput").value || "").trim();
  const referring = (document.getElementById("referringInput").value || "").trim();
  const receiving = (document.getElementById("receivingInput").value || "").trim();

  if (!referring || !receiving || !startInput) {
    return showError("Please select Starting Location, Referring Hospital, and Receiving Hospital.");
  }

  let startHospital = startInput;
  if (startInput === "West Base – Crawley") startHospital = "Crawley Hospital";
  if (startInput === "East Base – Maidstone") startHospital = "Maidstone Hospital";

  const toRef = transferTimes[`${startHospital}|${referring}`];
  const refToRec = transferTimes[`${referring}|${receiving}`];

  if (toRef == null) return showError(`No time found for "${startHospital}" → "${referring}"`);
  if (refToRec == null) return showError(`No time found for "${referring}" → "${receiving}"`);

  const baseHospital = (team === "west") ? "Crawley Hospital" : "Maidstone Hospital";
  const backToBaseRaw = transferTimes[`${receiving}|${baseHospital}`];
  if (backToBaseRaw == null) return showError(`No time found for "${receiving}" → "${baseHospital}"`);

  let displayTimeToReceiving, displayTotalJobCycle, etaRefMinutes;

  if (isTimeCritical) {
    // Time Critical logic:
    // - Blue light to referring (10% saving already baked into base times, per assumption text)
    // - 30 min packaging
    // - Blue light to receiving
    // - 1.2x multiplier applied only to the return leg (receiving -> base)
    // - 45 min handover at receiving
    const timeToReceiving = toRef + 30 + refToRec;
    const backToBase_tc = backToBaseRaw * 1.2;
    const totalJobCycle_tc = timeToReceiving + 45 + backToBase_tc;

    displayTimeToReceiving = timeToReceiving;
    displayTotalJobCycle = totalJobCycle_tc;
    etaRefMinutes = toRef;
  } else {
    // Non-Time Critical logic:
    // Multiply ALL displayed calculated results by 1.2 (routine driving)
    const timeToReceiving = toRef + 30 + refToRec;
    const backToBase_ntc = backToBaseRaw * 1.2;
    const totalJobCycle = timeToReceiving + 45 + backToBase_ntc;

    displayTimeToReceiving = timeToReceiving * 1.2;
    displayTotalJobCycle = totalJobCycle * 1.2;
    etaRefMinutes = toRef * 1.2;
  }

  const etaReferring = addMinutesToNowUK(etaRefMinutes);
  const etaReceiving = addMinutesToNowUK(displayTimeToReceiving);
  const backOnBaseTime = addMinutesToNowUK(displayTotalJobCycle);

  displayResults({
    isTimeCritical,
    timeToReceivingMinutes: displayTimeToReceiving,
    totalJobCycleMinutes: displayTotalJobCycle,
    etaReferringDate: etaReferring,
    etaReceivingDate: etaReceiving,
    backOnBaseDate: backOnBaseTime,
    referring,
    receiving
  });
}

/* =========================
   RESULT DISPLAY
   ========================= */
function displayResults(data) {
  const {
    isTimeCritical,
    timeToReceivingMinutes,
    totalJobCycleMinutes,
    etaReferringDate,
    etaReceivingDate,
    backOnBaseDate,
    referring,
    receiving
  } = data;

  const result = document.getElementById("result");
  const etaRefBox = document.getElementById("etaReferring");
  const etaRecBox = document.getElementById("etaReceiving");
  const assumptions = document.getElementById("assumptions");
  const jobCycle = document.getElementById("jobCycleResult");
  const handoverNote = document.getElementById("handoverNote");
  const backOnBase = document.getElementById("backOnBaseResult");

  etaRefBox.style.display = "block";
  etaRefBox.textContent = `ETA at Referring hospital: ${formatHHMM(etaReferringDate)}`;

  result.textContent = `Time to Receiving Hospital: ${minutesToHHMM(timeToReceivingMinutes)}`;

  if (isTimeCritical) {
    // Colour logic: < 3h green, 3–4h amber, >= 4h red
    const total = Math.round(timeToReceivingMinutes);
    result.style.color = "white";
    if (total < 180) result.style.background = "green";
    else if (total < 240) result.style.background = "#FFBF00";
    else result.style.background = "red";
  } else {
    // Non-time critical: always blue
    result.style.background = "#86C2BD";
    result.style.color = "white";
  }

  etaRecBox.style.display = "block";
  etaRecBox.textContent = `ETA at Receiving Hospital: ${formatHHMM(etaReceivingDate)}`;

  assumptions.style.display = "block";
  if (isTimeCritical) {
    assumptions.textContent =
      "This calculation assumes blue light driving to the referring hospital (10% time saving), 30 minutes packaging time, and then blue light driving to the receiving hospital, and is designed to assist with decision making for time critical transfers only";
  } else {
    assumptions.textContent =
      "This calculation assumes routine driving for all legs of journey and provides an estimated time to receiving hospital";
  }

  jobCycle.style.display = "block";
  jobCycle.textContent = `Total Estimated Job Cycle: ${minutesToHHMM(totalJobCycleMinutes)}`;

  handoverNote.style.display = "block";
  handoverNote.textContent = "Allows 45 minutes handover at receiving hospital";

  backOnBase.style.display = "block";
  backOnBase.textContent = `Estimated time back on base: ${formatHHMM(backOnBaseDate)}`;
  backOnBase.style.color = "white";

  const minutesOfDay = backOnBaseDate.getHours() * 60 + backOnBaseDate.getMinutes();
  const t2030 = 20 * 60 + 30;
  const t2130 = 21 * 60 + 30;

  if (minutesOfDay < t2030) backOnBase.style.background = "green";
  else if (minutesOfDay <= t2130) backOnBase.style.background = "#FFBF00";
  else backOnBase.style.background = "red";

  // HEMS alert only for time critical
  if (isTimeCritical) {
    updateHemsAlert(referring, receiving);
  } else {
    const alertBox = document.getElementById("hemsAlert");
    alertBox.style.display = "none";
    alertBox.textContent = "";
  }
}

/* =========================
   ERROR DISPLAY
   ========================= */
function showError(message) {
  const result = document.getElementById("result");
  const etaRefBox = document.getElementById("etaReferring");
  const etaRecBox = document.getElementById("etaReceiving");
  const assumptions = document.getElementById("assumptions");
  const jobCycle = document.getElementById("jobCycleResult");
  const handoverNote = document.getElementById("handoverNote");
  const backOnBase = document.getElementById("backOnBaseResult");
  const alertBox = document.getElementById("hemsAlert");

  result.textContent = message;
  result.style.background = "red";
  result.style.color = "white";

  etaRefBox.style.display = "none";
  etaRefBox.textContent = "";
  etaRecBox.style.display = "none";
  etaRecBox.textContent = "";
  assumptions.style.display = "none";
  assumptions.textContent = "";
  jobCycle.style.display = "none";
  jobCycle.textContent = "";
  handoverNote.style.display = "none";
  handoverNote.textContent = "";
  backOnBase.style.display = "none";
  backOnBase.textContent = "";
  alertBox.style.display = "none";
  alertBox.textContent = "";
}
